name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Vite reads VITE_* at build time and bakes the values into the
          # bundle (they end up in the public JS, visible to any visitor).
          # All of these are client-side write-keys / public IDs, so we use
          # GitHub Actions Variables (vars.*) rather than Secrets — matches
          # the convention TraigentFrontend uses for VITE_API_URL etc.
          # Each var is optional: analytics.js no-ops when empty.
          VITE_HUBSPOT_PORTAL_ID: ${{ vars.VITE_HUBSPOT_PORTAL_ID }}
          VITE_HUBSPOT_REGION: ${{ vars.VITE_HUBSPOT_REGION }}
          VITE_HUBSPOT_ACADEMY_FORM_ID: ${{ vars.VITE_HUBSPOT_ACADEMY_FORM_ID }}
          VITE_HSUTK_CHECK_URL: ${{ vars.VITE_HSUTK_CHECK_URL }}
          VITE_HSUTK_IDENTIFY_ENABLED: ${{ vars.VITE_HSUTK_IDENTIFY_ENABLED }}
          # Start Now OTP gate — public Worker endpoint (workers/access-otp).
          # Empty = OTP dormant, legacy email-form gate.
          VITE_OTP_WORKER_URL: ${{ vars.VITE_OTP_WORKER_URL }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          VITE_GA4_ID: ${{ vars.VITE_GA4_ID }}
          VITE_CLARITY_ID: ${{ vars.VITE_CLARITY_ID }}
          # Per-recipient pitch-package registry. JSON blob baked into the
          # bundle at build time (visible in the deployed JS, like every
          # other VITE_* above). Kept in Actions Variables — not Secrets —
          # because there's no server-side benefit to masking a value that
          # ships to every visitor's browser. Schema: src/lib/recipientPackages.js
          VITE_RECIPIENT_PACKAGES_JSON: ${{ vars.VITE_RECIPIENT_PACKAGES_JSON }}
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
