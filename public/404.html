<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Traigent - Redirecting</title>
  <script type="text/javascript">
    // Root-domain SPA redirect for direct hits to client-side routes.
    var l = window.location;
    var redirectPath = l.pathname.replace(/^\/+/, '');

    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/#/' + redirectPath +
      (l.search ? l.search : '') +
      (l.hash ? l.hash : '')
    );
  </script>
</head>
<body>
  <h1>Page Not Found</h1>
  <p>Redirecting to Traigent homepage...</p>
  <a href="/#/">Click here if you're not redirected automatically</a>
</body>
</html>
