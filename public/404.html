<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Traigent - Redirecting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // GitHub Pages fallback: reroute unknown paths to index with query payload.
      const pathSegmentsToKeep = 0
      const locationRef = window.location

      const redirectTarget =
        locationRef.protocol +
        '//' +
        locationRef.hostname +
        (locationRef.port ? ':' + locationRef.port : '') +
        locationRef.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/') +
        '/?/' +
        locationRef.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (locationRef.search
          ? '&' + locationRef.search.slice(1).replace(/&/g, '~and~')
          : '') +
        locationRef.hash

      locationRef.replace(redirectTarget)
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
  </body>
</html>
