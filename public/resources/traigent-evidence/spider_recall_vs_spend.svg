<svg
  xmlns="http://www.w3.org/2000/svg"
  width="880"
  height="520"
  viewBox="0 0 880 520"
  role="img"
  aria-label="Spider frontier recall versus represented evaluation spend"
>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fcfcf9" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <rect width="880" height="520" fill="url(#bg)" />
  <rect x="16" y="16" width="848" height="488" fill="#fffdfa" stroke="#e2e8f0" rx="18" />

  <text x="44" y="56" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#0f172a">
    Same Spider frontier with much less evaluation spend
  </text>
  <text x="44" y="82" font-family="Georgia, serif" font-size="15" fill="#475569">
    Traigent recovers the correct frontier long before exhaustive evaluation
  </text>

  <line x1="127.5" y1="112" x2="127.5" y2="450" stroke="#e2e8f0" stroke-dasharray="4 4" />
  <line x1="211.9" y1="112" x2="211.9" y2="450" stroke="#e2e8f0" stroke-dasharray="4 4" />
  <line x1="460.3" y1="112" x2="460.3" y2="450" stroke="#e2e8f0" stroke-dasharray="4 4" />
  <line x1="788.4" y1="112" x2="788.4" y2="450" stroke="#e2e8f0" stroke-dasharray="4 4" />

  <line x1="90" y1="374.1" x2="840" y2="374.1" stroke="#e2e8f0" stroke-dasharray="4 4" />
  <line x1="90" y1="222.2" x2="840" y2="222.2" stroke="#e2e8f0" stroke-dasharray="4 4" />
  <line x1="90" y1="138.4" x2="840" y2="138.4" stroke="#e2e8f0" stroke-dasharray="4 4" />

  <text x="127.5" y="472" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#64748b">$0.43</text>
  <text x="211.9" y="472" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#64748b">$0.61</text>
  <text x="460.3" y="472" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#64748b">$1.14</text>
  <text x="788.4" y="472" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#64748b">$1.84</text>

  <text x="78" y="378.1" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#64748b">0.80</text>
  <text x="78" y="226.2" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#64748b">0.90</text>
  <text x="78" y="142.4" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#64748b">1.00</text>

  <text x="440" y="502" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#0f172a">
    Represented evaluation spend
  </text>
  <text
    x="28"
    y="286"
    transform="rotate(-90 28 286)"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="15"
    fill="#0f172a"
  >
    Frontier recall
  </text>

  <polyline fill="none" stroke="url(#primary)" stroke-width="4" points="127.3,138.4 211.6,138.4 459.6,138.4 787.3,138.4" />
  <circle cx="127.3" cy="138.4" r="6" fill="#f8fafc" stroke="#22d3ee" stroke-width="3" />
  <circle cx="211.6" cy="138.4" r="6" fill="#f8fafc" stroke="#22d3ee" stroke-width="3" />
  <circle cx="459.6" cy="138.4" r="6" fill="#f8fafc" stroke="#6366f1" stroke-width="3" />
  <circle cx="787.3" cy="138.4" r="6" fill="#f8fafc" stroke="#6366f1" stroke-width="3" />

  <polyline fill="none" stroke="#2563eb" stroke-width="3" opacity="0.72" points="127.3,138.4 211.6,138.4 459.6,138.4 787.3,138.4" />
  <polyline fill="none" stroke="#94a3b8" stroke-width="3" opacity="0.72" points="125.8,138.4 208.8,138.4 455.8,138.4 783.1,138.4" />
  <polyline fill="none" stroke="#dc2626" stroke-width="3" points="126.2,374.1 210.0,138.4 458.1,138.4 783.0,138.4" />

  <circle cx="126.2" cy="374.1" r="5" fill="#dc2626" />
  <circle cx="210.0" cy="138.4" r="5" fill="#dc2626" />
  <circle cx="458.1" cy="138.4" r="5" fill="#dc2626" />
  <circle cx="783.0" cy="138.4" r="5" fill="#dc2626" />

  <rect x="618" y="124" width="204" height="122" fill="#ffffff" stroke="#e2e8f0" rx="14" />
  <circle cx="640" cy="150" r="6" fill="#22d3ee" />
  <text x="656" y="154" font-family="Georgia, serif" font-size="13" fill="#0f172a">Traigent bounded search</text>
  <circle cx="640" cy="178" r="6" fill="#2563eb" />
  <text x="656" y="182" font-family="Georgia, serif" font-size="13" fill="#0f172a">Combined greedy</text>
  <circle cx="640" cy="206" r="6" fill="#94a3b8" />
  <text x="656" y="210" font-family="Georgia, serif" font-size="13" fill="#0f172a">Random</text>
  <circle cx="640" cy="234" r="6" fill="#dc2626" />
  <text x="656" y="238" font-family="Georgia, serif" font-size="13" fill="#0f172a">Naive fixed order</text>
</svg>
