" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#0f172a">Spider real benchmark: tuned agent configs survive on the frontier</text><text x="44" y="78" font-family="Georgia, serif" font-size="15" fill="#475569">Tuning changes the operating point, not just the model choice</text><circle cx="543.3" cy="348.4" r="9" fill="#0f766e" stroke="#134e4a" stroke-width="2" /><text x="555.3" y="338.4" font-family="Georgia, serif" font-size="14" fill="#0f172a">Default</text><circle cx="730.3" cy="354.5" r="9" fill="#0f766e" stroke="#134e4a" stroke-width="2" /><text x="742.3" y="344.5" font-family="Georgia, serif" font-size="14" fill="#0f172a">Fast tuned</text><circle cx="629.8" cy="102.0" r="9" fill="#0f766e" stroke="#134e4a" stroke-width="2" /><text x="641.8" y="92.0" font-family="Georgia, serif" font-size="14" fill="#0f172a">Accurate tuned</text><circle cx="129.3" cy="351.5" r="9" fill="#0f766e" stroke="#134e4a" stroke-width="2" /><text x="141.3" y="341.5" font-family="Georgia, serif" font-size="14" fill="#0f172a">Cost tuned</text><circle cx="561.0" cy="388.0" r="9" fill="#0f766e" stroke="#134e4a" stroke-width="2" /><text x="573.0" y="378.0" font-family="Georgia, serif" font-size="14" fill="#0f172a">Fast model-only</text><circle cx="768.7" cy="205.5" r="7" fill="#cbd5e1" stroke="#64748b" stroke-width="2" /><text x="780.7" y="195.5" font-family="Georgia, serif" font-size="14" fill="#0f172a">Accurate model-only</text><circle cx="214.6" cy="360.6" r="7" fill="#cbd5e1" stroke="#64748b" stroke-width="2" /><text x="226.6" y="350.6" font-family="Georgia, serif" font-size="14" fill="#0f172a">Cost model-only</text><rect x="630" y="44" width="190" height="78" fill="#fffdfa" stroke="#e2e8f0" rx="12" /><circle cx="648" cy="64" r="6" fill="#0f766e" /><text x="664" y="68" font-family="Georgia, serif" font-size="13" fill="#0f172a">Pareto frontier</text><circle cx="648" cy="88" r="6" fill="#cbd5e1" /><text x="664" y="92" font-family="Georgia, serif" font-size="13" fill="#0f