  <g font-family="JetBrains Mono, monospace" font-size="20">
    <text x="340" y="172" fill="#7DD3FC">import</text>
    <text x="424" y="172" fill="#D9E7FB">{ getTrialParam, optimize, param }</text>
    <text x="340" y="210" fill="#C084FC">const</text>
    <text x="406" y="210" fill="#D9E7FB">rows = await loadDataset(</text>
    <text x="732" y="210" fill="#F6C177">'simple_questions.jsonl'</text>
