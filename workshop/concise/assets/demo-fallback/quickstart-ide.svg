    <text x="340" y="266" fill="#7DD3FC">configurationSpace</text>
    <text x="340" y="304" fill="#D9E7FB">model:</text>
    <text x="430" y="304" fill="#7DD3FC">param.enum</text>
    <text x="566" y="304" fill="#D9E7FB">([</text>
    <text x="590" y="304" fill="#F6C177">'cheap'</text>
    <text x="682" y="304" fill="#D9E7FB">, </text>
