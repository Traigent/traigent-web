    <text x="844" y="304" fill="#D9E7FB">, </text>
    <text x="866" y="304" fill="#F6C177">'accurate'</text>
    <text x="1008" y="304" fill="#D9E7FB">])</text>
    <text x="340" y="342" fill="#D9E7FB">temperature:</text>
    <text x="504" y="342" fill="#7DD3FC">param.float</text>
    <text x="660" y="342" fill="#D9E7FB">({ min: 0, max: 0.4, step: 0.2 })</text>
    <text x="340" y="398" fill="#7DD3FC">objectives</text>
    <text x="486" y="398" fill="#D9E7FB">['accuracy', 'cost']</text>
    <text x="340" y="454" fill="#7DD3FC">algorithm</text>
    <text x="486" y="454" fill="#F6C177">'grid'</text>
    <text x="340" y="492" fill="#7DD3FC">maxTrials</text>
    <text x="486" y="492" fill="#A6E3A1">9</text>
    <text x="340" y="548" fill="#7DD3FC">bestConfig</text>
    <text x="486" y="548" fill="#D9E7FB">{ model: 'accurate', temperature: 0 }</text>
    <text x="340" y="604" fill="#7DD3FC">trialCount</text>
    <text x="486" y="604" fill="#A6E3A1">9</text>
    <text x="340" y="660" fill="#7DD3FC">printSummary</text>
    <text x="522" y="660" fill="#D9E7FB">('quickstart/01_simple_qa', result)</text>
