sonar.host.url=https://sonarcloud.io
sonar.projectKey=Traigent_traigent-web
sonar.organization=traigent
sonar.projectName=traigent-web
sonar.sourceEncoding=UTF-8
sonar.branch.longLivedBranchesPattern=main|master|develop

sonar.sources=src

# No tests directory in this repo today — coverage path intentionally omitted.
sonar.javascript.file.suffixes=.js,.jsx,.cjs,.mjs
sonar.typescript.file.suffixes=.ts,.tsx

# Structural exclusions: build artifacts, deps, generated bundles, lock files,
# legacy minified bundle, public assets, and the gh-pages output dir.
sonar.exclusions=dist/**,node_modules/**,build/**,coverage/**,public/**,output/**,scripts/**,**/*.min.js,**/*.bundle.js,**/*.generated.*,**/__generated__/**,**/package-lock.json,**/yarn.lock,**/pnpm-lock.yaml,**/*.d.ts

sonar.cpd.exclusions=**/*.test.*,**/*.spec.*
